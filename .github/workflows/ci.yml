name: CI

on:
  push:
    branches: [main, wip]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt + clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --release
      - name: Smoke run (paint this repo)
        if: runner.os != 'Windows'
        run: |
          cargo build --release -p ctx2img-cli
          ./target/release/ctx2img paint README.md --out-dir /tmp/ctx2img-smoke --force
          ./target/release/ctx2img paint . --budget 2000 -q "smoke test"
          ./target/release/ctx2img read --find "paint" | head -5
